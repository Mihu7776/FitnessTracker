name: Java CI with Maven

permissions:
  contents: read

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lab02:
    name: LAB02 — schema (DatabaseSchemaTest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run LAB02 tests
        run: mvn -B test -Dtest=DatabaseSchemaTest -DfailIfNoTests=false --file pom.xml

      - name: Publish LAB02 test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: surefire-lab02
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

  lab03-entities:
    name: LAB03-1 — entities (Lab03EntitiesTest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run LAB03-1 tests
        run: mvn -B test -Dtest=Lab03EntitiesTest -DfailIfNoTests=false --file pom.xml

      - name: Publish LAB03-1 test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: surefire-lab03-entities
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

  package:
    name: Package JAR
    runs-on: ubuntu-latest
    needs: [ lab02, lab03-entities ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn -B -DskipTests package --file pom.xml

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: package
          path: target/*.jar
          if-no-files-found: ignore
          retention-days: 7

  qodana-config:
    name: Qodana Configuration Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Qodana Configuration Uploader
        env:
          QODANA_CONFIGURATIONS_TOKEN: ${{ secrets.QODANA_CONFIGURATIONS_TOKEN }}
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e QODANA_CONFIGURATIONS_TOKEN=$QODANA_CONFIGURATIONS_TOKEN \
            jetbrains/qodana-configuration-uploader:latest \
            --global-configs-file qodana-global-configurations.yaml \
            --qodana-host https://qodana.cloudp